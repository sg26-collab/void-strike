<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Bridge</title>
  <style>
    /* ── RESET & CUSTOM PROPERTIES ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #1a3d6b;
      --navy-dk:   #0f2444;
      --navy-lt:   #2c5f8a;
      --gold:      #d4961a;
      --gold-lt:   #f0b429;
      --green:     #2e7d52;
      --green-lt:  #3a9966;
      --red:       #cc2200;
      --bg:        #f0f2f7;
      --surface:   #ffffff;
      --border:    #e0e4ec;
      --text:      #1a1f2e;
      --muted:     #6b7592;
      --success-bg:#e8faf0;
      --error-bg:  #fdf0f0;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      line-height: 1.7;
      min-height: 100vh;
    }

    h1 { font-size: 2.4rem; margin-bottom: .6rem; }
    h2 { font-size: 1.8rem; margin-bottom: .5rem; }
    h3 { font-size: 1.35rem; margin-bottom: .4rem; }
    p  { margin-bottom: .9rem; }
    ul, ol { margin: .4rem 0 .9rem 1.6rem; }
    li { margin-bottom: .25rem; }

    /* ── BUTTONS ────────────────────────────────────────────────── */
    button {
      font-family: Georgia, serif;
      font-size: 1.1rem;
      padding: 12px 30px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all .22s cubic-bezier(.4,0,.2,1);
      font-weight: bold;
      letter-spacing: .02em;
    }
    button:active { transform: scale(.95) !important; }
    button:disabled { opacity: .38; cursor: default; pointer-events: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--navy-lt) 0%, var(--navy-dk) 100%);
      color: #fff;
      box-shadow: 0 4px 18px rgba(26,61,107,.38);
    }
    .btn-primary:hover {
      box-shadow: 0 8px 28px rgba(26,61,107,.52);
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: linear-gradient(135deg, var(--green-lt) 0%, var(--green) 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(46,125,82,.32);
    }
    .btn-secondary:hover {
      box-shadow: 0 8px 24px rgba(46,125,82,.48);
      transform: translateY(-2px);
    }
    .btn-outline {
      background: transparent;
      color: var(--navy-lt);
      border: 2px solid var(--navy-lt);
    }
    .btn-outline:hover {
      background: var(--navy-lt);
      color: #fff;
      transform: translateY(-1px);
    }
    .btn-sm { font-size: .92rem; padding: 8px 20px; }

    /* ── NAV BAR ───────────────────────────────────────────────── */
    #nav {
      display: none;
      background: linear-gradient(90deg, var(--navy-dk) 0%, var(--navy) 100%);
      color: #fff;
      padding: 12px 28px;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 24px rgba(0,0,0,.28);
    }
    #nav.visible { display: flex; }
    #nav button {
      background: rgba(255,255,255,.14);
      color: #fff;
      padding: 7px 18px;
      font-size: .88rem;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,.22);
      font-weight: normal;
      letter-spacing: 0;
      box-shadow: none;
    }
    #nav button:hover {
      background: rgba(255,255,255,.26);
      transform: none;
      box-shadow: none;
    }
    #nav .nav-progress {
      margin-left: auto;
      font-size: .88rem;
      font-family: system-ui, sans-serif;
      background: rgba(255,255,255,.14);
      padding: 5px 16px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,.22);
      white-space: nowrap;
    }

    /* ── VIEWS ─────────────────────────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; }
    #view-home.active { display: flex; }

    /* ── HOME ──────────────────────────────────────────────────── */
    #view-home {
      min-height: 100vh;
      background: linear-gradient(150deg, #0d1d3a 0%, #1a3460 45%, #0f2d54 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 28px 56px;
      position: relative;
      overflow: hidden;
      color: #fff;
    }
    /* Giant ghost suits in bg */
    #view-home::before {
      content: '♠♥♦♣';
      position: absolute;
      font-size: 28vw;
      opacity: .04;
      top: 50%; left: 50%;
      transform: translate(-50%, -52%);
      pointer-events: none;
      letter-spacing: .08em;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
    }
    /* Subtle radial glow */
    #view-home::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,150,26,.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #view-home > * { position: relative; z-index: 1; }

    #view-home .home-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 50px;
      padding: 6px 20px;
      font-size: .82rem;
      font-family: system-ui, sans-serif;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 1.8rem;
      color: rgba(255,255,255,.8);
    }
    #view-home h1 {
      font-size: 3.4rem;
      background: linear-gradient(135deg, #fff 20%, var(--gold-lt) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .7rem;
      line-height: 1.15;
    }
    #view-home .subtitle {
      font-size: 1.18rem;
      color: rgba(255,255,255,.68);
      margin-bottom: 2.8rem;
      max-width: 460px;
    }
    #view-home .home-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3.2rem;
    }
    #view-home .btn-primary {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
      color: var(--navy-dk);
      box-shadow: 0 6px 32px rgba(212,150,26,.55);
      font-size: 1.18rem;
      padding: 16px 44px;
    }
    #view-home .btn-primary:hover {
      box-shadow: 0 10px 44px rgba(212,150,26,.72);
      transform: translateY(-3px);
    }
    #view-home .btn-secondary {
      background: rgba(255,255,255,.13);
      border: 1.5px solid rgba(255,255,255,.34);
      color: #fff;
      box-shadow: none;
      font-size: 1.1rem;
    }
    #view-home .btn-secondary:hover {
      background: rgba(255,255,255,.22);
      box-shadow: none;
      transform: translateY(-2px);
    }
    .home-progress-wrap { width: 100%; max-width: 380px; }
    .progress-bar-wrap {
      background: rgba(255,255,255,.14);
      border-radius: 50px;
      height: 9px;
      overflow: hidden;
      margin: .6rem 0 .45rem;
    }
    .progress-bar-fill {
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-lt) 100%);
      height: 100%;
      border-radius: 50px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px rgba(212,150,26,.65);
    }
    .progress-label { font-size: .92rem; color: rgba(255,255,255,.55); font-family: system-ui, sans-serif; }
    .home-note { margin-top: 2.4rem; font-size: .88rem; color: rgba(255,255,255,.36); font-family: system-ui, sans-serif; }

    /* ── LESSON LIST ───────────────────────────────────────────── */
    #view-lessons {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 56px;
    }
    #view-lessons h1 { margin-bottom: 1.6rem; color: var(--navy-dk); }

    .module-group   { margin-bottom: 2rem; }
    .module-heading {
      font-size: .78rem;
      font-weight: 700;
      font-family: system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: .75rem;
      padding: 0 4px;
    }

    .lesson-row {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 15px 20px;
      margin-bottom: 10px;
      cursor: pointer;
      border: 1.5px solid var(--border);
      transition: all .2s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    .lesson-row:hover {
      border-color: var(--navy-lt);
      box-shadow: 0 6px 22px rgba(26,61,107,.13);
      transform: translateX(5px);
    }
    .lesson-row.locked          { opacity: .42; cursor: default; }
    .lesson-row.locked:hover    { border-color: var(--border); box-shadow: 0 1px 6px rgba(0,0,0,.06); transform: none; }
    .lesson-row.done            { border-color: var(--green); background: #f6fffa; }
    .lesson-row.done:hover      { border-color: var(--green-lt); }

    .lesson-num {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem;
      color: var(--muted);
      flex-shrink: 0;
      font-family: system-ui, sans-serif;
      font-weight: 600;
    }
    .lesson-row.done .lesson-num {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .lesson-title-text { flex: 1; font-size: 1.05rem; }
    .check-icon        { font-size: 1.15rem; color: var(--green); }
    .lock-icon         { font-size: 1rem; color: var(--muted); }

    /* ── LESSON VIEW ───────────────────────────────────────────── */
    #view-lesson {
      max-width: 790px;
      margin: 0 auto;
      padding: 32px 24px 72px;
    }
    .lesson-header { margin-bottom: 1.8rem; }

    .lesson-module-label {
      display: inline-block;
      font-size: .75rem;
      font-family: system-ui, sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--navy-lt);
      background: rgba(44,95,138,.1);
      padding: 4px 14px;
      border-radius: 50px;
      margin-bottom: .7rem;
    }
    .lesson-title   { font-size: 2rem; color: var(--navy-dk); margin: .2rem 0 .8rem; }
    .page-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .page-dots { display: flex; gap: 6px; align-items: center; }
    .page-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all .25s cubic-bezier(.4,0,.2,1);
    }
    .page-dot.active { background: var(--navy-lt); width: 22px; border-radius: 50px; }
    .page-dot.done   { background: var(--green); }
    .page-indicator-text { font-size: .85rem; color: var(--muted); font-family: system-ui, sans-serif; }

    /* Content card */
    .page-content {
      background: var(--surface);
      border-radius: 20px;
      padding: 30px 34px;
      min-height: 240px;
      margin-bottom: 1.8rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
      border: 1px solid var(--border);
    }
    .page-heading {
      font-size: 1.48rem;
      margin-bottom: 1rem;
      color: var(--navy-dk);
      padding-bottom: .8rem;
      border-bottom: 2px solid var(--bg);
    }
    .page-body   { font-size: 1.08rem; }
    .page-visual { margin: 1.2rem 0; }

    .lesson-nav { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .lesson-nav .spacer { flex: 1; }

    /* ── EXERCISE VIEW ─────────────────────────────────────────── */
    #view-exercise {
      max-width: 790px;
      margin: 0 auto;
      padding: 32px 24px 72px;
    }
    .exercise-header { margin-bottom: 1.6rem; }
    .exercise-title  { font-size: 1.7rem; color: var(--navy-dk); margin-bottom: .4rem; }
    .exercise-prompt { font-size: 1.05rem; color: var(--muted); }
    #exercise-area   { min-height: 200px; }

    /* ── RESULTS VIEW ──────────────────────────────────────────── */
    #view-results {
      max-width: 680px;
      margin: 0 auto;
      padding: 64px 24px 64px;
      text-align: center;
    }
    .result-icon    { font-size: 5rem; margin-bottom: .9rem; animation: popIn .42s cubic-bezier(.36,1.55,.5,1); }
    @keyframes popIn { from { transform: scale(.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-heading { font-size: 2rem; color: var(--navy-dk); margin-bottom: .8rem; }
    .result-explain {
      font-size: 1.05rem;
      background: var(--surface);
      border-radius: 18px;
      padding: 24px 28px;
      margin: 1.4rem 0 2.4rem;
      text-align: left;
      line-height: 1.75;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      border: 1px solid var(--border);
    }
    .result-buttons { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    /* ── CARDS ─────────────────────────────────────────────────── */
    .card {
      display: inline-flex;
      flex-direction: column;
      justify-content: space-between;
      background: #fff;
      border: 1.5px solid #dde3f0;
      border-radius: 11px;
      padding: 5px 7px;
      font-family: Georgia, serif;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      position: relative;
      transition: transform .16s cubic-bezier(.4,0,.2,1), box-shadow .16s, border-color .12s;
      box-shadow: 0 2px 10px rgba(0,0,0,.11), 0 0 0 1px rgba(0,0,0,.04);
    }
    .card:hover {
      transform: translateY(-9px) rotate(-1deg);
      box-shadow: 0 14px 32px rgba(0,0,0,.18);
    }
    .card.selected {
      border-color: var(--navy-lt);
      box-shadow: 0 0 0 3px rgba(44,95,138,.38), 0 10px 24px rgba(44,95,138,.22);
      transform: translateY(-10px);
    }
    .card.correct {
      border-color: var(--green);
      background: linear-gradient(135deg, #fff 0%, #f2fff8 100%);
      box-shadow: 0 0 0 2px var(--green), 0 5px 16px rgba(46,125,82,.22);
    }
    .card.wrong {
      border-color: #c0392b;
      background: linear-gradient(135deg, #fff 0%, #fff5f5 100%);
      box-shadow: 0 0 0 2px #c0392b, 0 5px 16px rgba(192,57,43,.22);
    }
    .card.no-hover  { cursor: default; }
    .card.no-hover:hover { transform: none; box-shadow: 0 2px 10px rgba(0,0,0,.11); }

    .card.red  { color: #cc2200; }
    .card.black{ color: #111; }

    /* Large card */
    .card-lg { width: 76px; height: 114px; font-size: 1rem; padding: 5px 8px; }
    .card-lg .card-corner       { font-size: 1rem; line-height: 1.15; }
    .card-lg .card-center-suit  { font-size: 2.1rem; text-align: center; }
    .card-lg .card-corner-bot   { transform: rotate(180deg); font-size: 1rem; line-height: 1.15; align-self: flex-end; }

    /* Small card */
    .card-sm { width: 54px; height: 80px; font-size: .82rem; padding: 3px 5px; }
    .card-sm .card-corner       { font-size: .82rem; line-height: 1.1; }
    .card-sm .card-center-suit  { font-size: 1.4rem; text-align: center; }
    .card-sm .card-corner-bot   { transform: rotate(180deg); font-size: .82rem; line-height: 1.1; align-self: flex-end; }

    /* Face-down back */
    .card.back {
      background: repeating-linear-gradient(
        135deg,
        #1a3d6b, #1a3d6b 5px,
        #0f2444 5px, #0f2444 12px
      );
      border-color: #0f2444;
      box-shadow: 0 2px 10px rgba(0,0,0,.32), inset 0 1px 1px rgba(255,255,255,.1);
    }

    .hand { display: flex; flex-wrap: wrap; gap: 10px; margin: 1rem 0; align-items: flex-end; }
    .hand-label { font-size: .92rem; color: var(--muted); margin-bottom: .4rem; font-family: system-ui, sans-serif; }

    /* ── TABLE DIAGRAM ─────────────────────────────────────────── */
    .table-diagram {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: auto auto auto;
      gap: 8px;
      max-width: 360px;
      margin: 1.2rem auto;
    }
    .table-felt {
      grid-column: 1 / 4;
      grid-row: 1 / 4;
      background: radial-gradient(ellipse at center, #2d7a50 0%, #1a5a35 100%);
      border-radius: 50%;
      aspect-ratio: 1;
      position: relative;
      z-index: 0;
      box-shadow: inset 0 6px 24px rgba(0,0,0,.3), 0 6px 24px rgba(0,0,0,.22);
    }
    .table-seat   { z-index: 1; text-align: center; font-size: .95rem; font-weight: bold; }
    .seat-n { grid-column: 2; grid-row: 1; align-self: start; }
    .seat-s { grid-column: 2; grid-row: 3; align-self: end; }
    .seat-w { grid-column: 1; grid-row: 2; align-self: center; justify-self: start; }
    .seat-e { grid-column: 3; grid-row: 2; align-self: center; justify-self: end; }

    /* Partnership diagram */
    .partnership-diagram { display: flex; gap: 28px; justify-content: center; margin: 1.2rem 0; flex-wrap: wrap; }
    .partner-box {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 24px;
      text-align: center;
      min-width: 110px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      transition: transform .15s;
    }
    .partner-box:hover           { transform: translateY(-2px); }
    .partner-box.you             { border-color: var(--navy-lt); background: #f0f5ff; }
    .partner-box.partner         { border-color: var(--green); background: #f0fff8; }
    .partner-box .seat-label     { font-size: 1.5rem; font-weight: bold; }
    .partner-box .seat-name      { font-size: .9rem; color: var(--muted); }

    /* ── QUIZ / PUZZLE UI ──────────────────────────────────────── */
    .quiz-options { display: flex; flex-direction: column; gap: 10px; margin: 1rem 0; }
    .quiz-option {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      text-align: left;
      font-size: 1.05rem;
      transition: all .18s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 1px 5px rgba(0,0,0,.05);
      cursor: pointer;
    }
    .quiz-option:hover:not(:disabled) {
      border-color: var(--navy-lt);
      background: #f0f6ff;
      transform: translateX(5px);
      box-shadow: 0 4px 16px rgba(44,95,138,.16);
    }
    .quiz-option.correct-answer {
      border-color: var(--green);
      background: var(--success-bg);
      color: #1a5a1a;
      box-shadow: 0 0 0 1px var(--green);
    }
    .quiz-option.wrong-answer {
      border-color: #c0392b;
      background: var(--error-bg);
      color: #7a0000;
      box-shadow: 0 0 0 1px #c0392b;
    }
    .quiz-option:disabled         { cursor: default; }
    .quiz-option:disabled:hover   { border-color: var(--border); background: var(--surface); transform: none; box-shadow: 0 1px 5px rgba(0,0,0,.05); }

    .quiz-feedback {
      margin-top: 1rem;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 1.05rem;
      animation: slideUp .3s cubic-bezier(.4,0,.2,1);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .quiz-feedback.correct { background: var(--success-bg); color: #1a5a1a; border: 1.5px solid var(--green); }
    .quiz-feedback.wrong   { background: var(--error-bg); color: #7a0000; border: 1.5px solid #c0392b; }

    /* HCP counter */
    .hcp-area { margin: 1rem 0; }
    .hcp-score-display {
      font-size: 3rem;
      font-weight: bold;
      color: var(--navy-lt);
      margin: .8rem 0;
      font-variant-numeric: tabular-nums;
      transition: transform .15s;
    }
    .hcp-hint { font-size: .92rem; color: var(--muted); margin-bottom: .6rem; font-family: system-ui, sans-serif; }

    /* Bid widget */
    .bid-widget { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin: 1rem 0; }
    .bid-select {
      font-family: Georgia, serif;
      font-size: 1.1rem;
      padding: 10px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      cursor: pointer;
      transition: border-color .15s;
      box-shadow: 0 1px 5px rgba(0,0,0,.06);
    }
    .bid-select:focus { outline: none; border-color: var(--navy-lt); }
    .bid-display {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 10px 22px;
      font-size: 1.2rem;
      min-width: 90px;
      text-align: center;
      box-shadow: 0 1px 5px rgba(0,0,0,.06);
    }
    .bid-red  { color: #cc2200; }
    .bid-black { color: #111; }

    /* Auction table */
    .auction-table {
      border-collapse: separate;
      border-spacing: 0;
      margin: 1rem 0;
      font-size: 1rem;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 16px rgba(0,0,0,.1);
    }
    .auction-table th {
      background: linear-gradient(135deg, var(--navy-lt) 0%, var(--navy) 100%);
      color: #fff;
      padding: 10px 22px;
      font-family: system-ui, sans-serif;
      font-size: .88rem;
      letter-spacing: .05em;
    }
    .auction-table td {

// CARD UTILS
// ════════════════════════════════════════════════════════════════════
function makeCard(rank, suit) { return { rank, suit }; }

function renderCard(card, opts = {}) {
  if (!card) return '';
  const { rank, suit } = card;
  const s = SUITS[suit];
  const sizeClass = opts.sm ? 'card-sm' : 'card-lg';
  const extra = [sizeClass];
  if (opts.back)     extra.push('back');
  else               extra.push(s.cls);
  if (opts.selected) extra.push('selected');
  if (opts.correct)  extra.push('correct');
  if (opts.wrong)    extra.push('wrong');
  if (opts.noHover)  extra.push('no-hover');
  const id   = opts.id   ? `id="${opts.id}"` : '';
  const onclick = opts.onclick ? `onclick="${opts.onclick}"` : '';
  if (opts.back) {
    return `<div ${id} class="card ${extra.join(' ')}" ${onclick}></div>`;
  }
  return `<div ${id} class="card ${extra.join(' ')}" ${onclick}>
    <div class="card-corner">${rank}<br>${s.sym}</div>
    <div class="card-center-suit">${s.sym}</div>
    <div class="card-corner-bot">${rank}<br>${s.sym}</div>
  </div>`;
}

function renderHand(cards, opts = {}) {
  return `<div class="hand">${cards.map((c, i) => {
    const o = Object.assign({}, opts, opts.perCard ? opts.perCard(c, i) : {});
    return renderCard(c, o);
  }).join('')}</div>`;
}

// PROGRESS
// ════════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'bridge_progress';
let progress = { completedLessons: [], lastLesson: null };

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) progress = JSON.parse(raw);
  } catch(e) {}
}

function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch(e) {}
}

function markLessonComplete(id) {
  if (!progress.completedLessons.includes(id)) {
    progress.completedLessons.push(id);
    saveProgress();
  }
}

function isLessonComplete(id) { return progress.completedLessons.includes(id); }
function isLessonUnlocked(id) { return id === 1 || progress.completedLessons.includes(id - 1); }

// ════════════════════════════════════════════════════════════════════
// APP STATE
// ════════════════════════════════════════════════════════════════════
const APP = { view: 'home', lessonId: null, pageIndex: 0, puzzleId: null, puzzleState: {} };

// ════════════════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════════════════
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  APP.view = id;

  const nav = document.getElementById('nav');
  if (id === 'home') {
    nav.classList.remove('visible');
    renderHome();
  } else {
    nav.classList.add('visible');
    updateNavProgress();
    if (id === 'lessons') renderLessonList();
  }
  window.scrollTo(0, 0);
}

function updateNavProgress() {
  document.getElementById('nav-progress').textContent =
    progress.completedLessons.length + ' / 13 complete';
}

// ════════════════════════════════════════════════════════════════════
// HOME
// ════════════════════════════════════════════════════════════════════
function renderHome() {
  const done = progress.completedLessons.length;
  const pct  = Math.round(done / 13 * 100);
  document.getElementById('home-progress-fill').style.width = pct + '%';
  document.getElementById('home-progress-label').textContent = done + ' of 13 lessons complete';
  const btn = document.getElementById('btn-continue');
  if (progress.lastLesson) {
    btn.style.display = '';
    const l = LESSONS.find(l => l.id === progress.lastLesson);
    btn.textContent = 'Continue: Lesson ' + progress.lastLesson + (l ? ' — ' + l.title : '');
  } else {
    btn.style.display = 'none';
  }
}

function handleStart() { showView('lessons'); }

function handleContinue() {
  if (progress.lastLesson) openLesson(progress.lastLesson);
  else showView('lessons');
}

// ════════════════════════════════════════════════════════════════════
// LESSON LIST
// ════════════════════════════════════════════════════════════════════
function renderLessonList() {
  const container = document.getElementById('lesson-list');
  // Group by module
  const modules = [];
  const modMap   = {};
  LESSONS.forEach(l => {
    if (!modMap[l.module]) { modMap[l.module] = []; modules.push(l.module); }
    modMap[l.module].push(l);
  });

  let html = '';
  modules.forEach(mod => {
    html += `<div class="module-group"><div class="module-heading">${mod}</div>`;
    modMap[mod].forEach(l => {
      const done     = isLessonComplete(l.id);
      const unlocked = isLessonUnlocked(l.id);
      const cls      = done ? 'done' : (!unlocked ? 'locked' : '');
      const onclick  = unlocked ? `onclick="openLesson(${l.id})"` : '';
      html += `<div class="lesson-row ${cls}" ${onclick}>
        <span class="lesson-num">${l.id}.</span>
        <span class="lesson-title-text">${l.title}</span>
        ${done ? '<span class="check-icon">✓</span>' : (!unlocked ? '<span class="lock-icon">🔒</span>' : '')}
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

// ════════════════════════════════════════════════════════════════════
// LESSON ENGINE
// ════════════════════════════════════════════════════════════════════
function openLesson(id) {
  APP.lessonId  = id;
  APP.pageIndex = 0;
  progress.lastLesson = id;
  saveProgress();
  showView('lesson');
  renderLessonPage();
}

function renderLessonPage() {
  const lesson = LESSONS.find(l => l.id === APP.lessonId);
  if (!lesson) return;
  const page = lesson.pages[APP.pageIndex];
  const total = lesson.pages.length;

  document.getElementById('lesson-module-label').textContent = lesson.module;
  document.getElementById('lesson-title-el').textContent     = lesson.title;
  let dotsHtml = '<div class="page-dots">';
  for (let i = 0; i < total; i++) {
    const cls = i < APP.pageIndex ? 'page-dot done' : (i === APP.pageIndex ? 'page-dot active' : 'page-dot');
    dotsHtml += `<div class="${cls}"></div>`;
  }
  dotsHtml += `</div><span class="page-indicator-text">Page ${APP.pageIndex + 1} of ${total}</span>`;
  document.getElementById('page-indicator').innerHTML = dotsHtml;

  document.getElementById('btn-prev').disabled = (APP.pageIndex === 0);

  const isLast = APP.pageIndex === total - 1;
  const nextBtn = document.getElementById('btn-next');

  if (page.type === 'puzzle') {
    const puzzle = PUZZLES[page.puzzleId];
    nextBtn.textContent  = isLast ? 'Finish Lesson' : 'Next →';
    nextBtn.disabled     = true; // enabled after puzzle answered
    renderInlinePuzzle(puzzle, page, isLast);
  } else {
    nextBtn.textContent = isLast ? 'Finish Lesson' : 'Next →';
    nextBtn.disabled    = false;
    const content = document.getElementById('page-content');
    content.innerHTML   = `
      <div class="page-heading">${page.heading}</div>
      <div class="page-body">${page.body || ''}</div>
      ${page.visual ? `<div class="page-visual">${page.visual}</div>` : ''}
    `;
  }
}

function renderInlinePuzzle(puzzle, page, isLastPage) {
  const content = document.getElementById('page-content');
  content.innerHTML = `
    <div class="page-heading">${page.heading}</div>
    <div class="page-body" style="margin-bottom:.8rem">${page.body || ''}</div>
    <div id="inline-puzzle-area"></div>
  `;
  const area = document.getElementById('inline-puzzle-area');
  renderPuzzle(puzzle, area, (correct, explanation) => {
    // Enable Next after answering
    document.getElementById('btn-next').disabled = false;
    if (correct && isLastPage) {
      markLessonComplete(APP.lessonId);
    }
  });
}

function nextPage() {
  const lesson = LESSONS.find(l => l.id === APP.lessonId);
  if (!lesson) return;
  if (APP.pageIndex < lesson.pages.length - 1) {
    APP.pageIndex++;
    renderLessonPage();
  } else {
    // Last page — complete lesson
    markLessonComplete(APP.lessonId);
    // Go back to lesson list, showing completion
    showView('lessons');
  }
}

function prevPage() {
  if (APP.pageIndex > 0) {
    APP.pageIndex--;
    renderLessonPage();
  }
}

// ════════════════════════════════════════════════════════════════════
// PUZZLE RENDERERS
// ════════════════════════════════════════════════════════════════════
function renderPuzzle(puzzle, container, onAnswered) {
  switch (puzzle.type) {
    case 'A': renderTypeA(puzzle, container, onAnswered); break;
    case 'B': renderTypeB(puzzle, container, onAnswered); break;
    case 'C': renderTypeC(puzzle, container, onAnswered); break;
    case 'D': renderTypeD(puzzle, container, onAnswered); break;
    case 'E': renderTypeE(puzzle, container, onAnswered); break;
    case 'F': renderTypeF(puzzle, container, onAnswered); break;
  }
}

// ── Type A: Multiple Choice ──────────────────────────────────────
function renderTypeA(puzzle, container, onAnswered) {
  let answered = false;
  const opts = puzzle.options.map((opt, i) =>
    `<button class="quiz-option" id="qa-opt-${i}" onclick="selectA(${i})">${opt}</button>`
  ).join('');
  container.innerHTML = `<div class="quiz-options">${opts}</div><div id="qa-feedback"></div>`;

  window.selectA = function(i) {
    if (answered) return;
    answered = true;
    const correct = i === puzzle.correct;
    puzzle.options.forEach((_, j) => {
      const btn = document.getElementById('qa-opt-' + j);
      btn.disabled = true;
      if (j === puzzle.correct) btn.classList.add('correct-answer');
      if (j === i && !correct)  btn.classList.add('wrong-answer');
    });
    const fb = document.getElementById('qa-feedback');
    fb.className = 'quiz-feedback ' + (correct ? 'correct' : 'wrong');
    fb.innerHTML = (correct ? '✓ Correct! ' : '✗ Not quite. ') + puzzle.explanation;
    onAnswered(correct, puzzle.explanation);
  };
}

// ── Type B: Click a card ─────────────────────────────────────────
function renderTypeB(puzzle, container, onAnswered) {
  let answered = false;
  const labels = puzzle.labels || [];
  const isMulti = Array.isArray(puzzle.multipleCorrect);

  let html = '<div class="hand" style="gap:10px">';
  puzzle.hand.forEach((card, i) => {
    const label = labels[i] ? `<div class="hand-label">${labels[i]}</div>` : '';
    html += `<div style="text-align:center">
      ${label}
      ${renderCard(card, { id: 'tb-card-' + i, onclick: `selectB(${i})` })}
    </div>`;
  });
  html += '</div><div id="tb-feedback"></div>';
  container.innerHTML = html;

  window.selectB = function(i) {
    if (answered) return;
    answered = true;
    let correct;
    if (isMulti) {
      correct = puzzle.multipleCorrect.includes(i);
    } else {
      correct = i === puzzle.correct;
    }
    // mark cards
    puzzle.hand.forEach((_, j) => {
      const el = document.getElementById('tb-card-' + j);
      if (!el) return;
      el.onclick = null;
      el.classList.remove('card');
      // Re-render state
      const isCorrectCard = isMulti ? puzzle.multipleCorrect.includes(j) : j === puzzle.correct;
      if (isCorrectCard) el.classList.add('correct');
      if (j === i && !isCorrectCard) el.classList.add('wrong');
    });
    const fb = document.getElementById('tb-feedback');
    fb.className = 'quiz-feedback ' + (correct ? 'correct' : 'wrong');
    fb.innerHTML = (correct ? '✓ Correct! ' : '✗ Not quite. ') + puzzle.explanation;
    onAnswered(correct, puzzle.explanation);
  };
}

// ── Type C: HCP Counting ─────────────────────────────────────────
function renderTypeC(puzzle, container, onAnswered) {
  let total = 0;
  let clicked = new Set();
  let finished = false;

  function renderC() {
    let html = `<div class="hcp-area">
      <div class="hcp-hint">Click each honor (A, K, Q, J) to count its points:</div>
      <div class="hand" style="gap:10px">`;
    puzzle.hand.forEach((card, i) => {
      const pts  = HCP_TABLE[card.rank] || 0;
      const done = clicked.has(i);
      const opts = {
        id: 'tc-card-' + i,
        onclick: pts > 0 && !done ? `selectC(${i})` : null,
        noHover: pts === 0 || done,
        correct: done && pts > 0,
      };
      html += `<div style="text-align:center">
        ${renderCard(card, opts)}
        <div style="font-size:.85rem;color:#888;margin-top:3px">${done ? '+' + pts : (pts > 0 ? '?' : '0')}</div>
      </div>`;
    });
    html += `</div>
      <div class="hcp-score-display">Total: ${total} HCP</div>`;

    // Show submit if all honors clicked
    const allHonors = puzzle.hand.every((c, i) => !HCP_TABLE[c.rank] || clicked.has(i));
    if (allHonors && !finished) {
      html += `<button class="btn-primary btn-sm" onclick="submitC()">Check My Total</button>`;
    }
    if (finished) {
      html += `<div id="tc-feedback"></div>`;
    }
    html += '</div>';
    container.innerHTML = html;

    if (finished) {
      const correct = total === puzzle.correctHCP;
      const fb = document.getElementById('tc-feedback');
      fb.className = 'quiz-feedback ' + (correct ? 'correct' : 'wrong');
      fb.innerHTML = (correct ? '✓ Correct! ' : '✗ Not quite. ') + puzzle.explanation;
    }
  }

  window.selectC = function(i) {
    if (finished || clicked.has(i)) return;
    const pts = HCP_TABLE[puzzle.hand[i].rank] || 0;
    if (pts > 0) { clicked.add(i); total += pts; }
    renderC();
  };

  window.submitC = function() {
    finished = true;
    renderC();
    onAnswered(total === puzzle.correctHCP, puzzle.explanation);
  };

  renderC();
}

// ── Type D: Order cards ──────────────────────────────────────────
function renderTypeD(puzzle, container, onAnswered) {
  let order = [];
  let finished = false;

  function renderD() {
    let html = `<div style="margin-bottom:.5rem;font-size:.95rem;color:#555">
      Click cards from <strong>LOWEST</strong> to <strong>HIGHEST</strong>. (${order.length} of ${puzzle.hand.length} selected)
    </div><div class="hand" style="gap:10px">`;
    puzzle.hand.forEach((card, i) => {
      const pos  = order.indexOf(i);
      const done = pos !== -1;
      let extra  = '';
      if (finished) {
        extra = puzzle.correctOrder[pos] === i || (done && puzzle.correctOrder.indexOf(i) === pos) ? 'correct' : '';
      }
      html += `<div style="text-align:center;position:relative">
        ${renderCard(card, { id: 'td-card-' + i, onclick: !done && !finished ? `selectD(${i})` : null, noHover: done || finished, correct: finished && done })}
        ${done ? `<div style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#2c5f8a;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:bold">${pos + 1}</div>` : ''}
      </div>`;
    });
    html += '</div>';

    if (order.length === puzzle.hand.length && !finished) {
      html += `<button class="btn-primary btn-sm" style="margin-top:.5rem" onclick="submitD()">Check Order</button>`;
    }
    if (finished) {
      html += `<div id="td-feedback"></div>`;
    }
    container.innerHTML = html;
    if (finished) {
      const correct = JSON.stringify(order) === JSON.stringify(puzzle.correctOrder);
      const fb = document.getElementById('td-feedback');
      fb.className = 'quiz-feedback ' + (correct ? 'correct' : 'wrong');
      fb.innerHTML = (correct ? '✓ Correct! ' : '✗ Not quite. ') + puzzle.explanation;
    }
  }

  window.selectD = function(i) {
    if (finished || order.includes(i)) return;
    order.push(i);
    renderD();
  };

  window.submitD = function() {
    finished = true;
    renderD();
    const correct = JSON.stringify(order) === JSON.stringify(puzzle.correctOrder);
    onAnswered(correct, puzzle.explanation);
  };

  renderD();
}

// ── Type E: Bid entry ────────────────────────────────────────────
function renderTypeE(puzzle, container, onAnswered) {
  let chosenLevel  = null;
  let chosenStrain = null;
  let submitted    = false;

  const strains = ['C','D','H','S','NT'];
  const levels  = [1,2,3,4,5,6,7];

  function strainDisplay(s) {
    const sym = STRAIN_SYM[s];
    const cls = STRAIN_CLS[s];
    return `<span class="${cls}">${sym}</span>`;
  }

  function renderE() {
    // Show hand if provided
    let handHtml = '';
    if (puzzle.hand) {
      handHtml = `<div class="hand" style="gap:6px;margin:.5rem 0">
        ${puzzle.hand.map(c => renderCard(c, {sm: true, noHover: true})).join('')}
      </div>`;
    }

    let html = handHtml + `<div class="bid-widget" style="flex-direction:column;gap:.8rem;align-items:flex-start">
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:.95rem;color:#555">Level:</span>
        ${levels.map(l => `<button class="btn-outline btn-sm" style="${chosenLevel===l?'background:#2c5f8a;color:#fff':''}" onclick="setLevel(${l})">${l}</button>`).join('')}
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:.95rem;color:#555">Strain:</span>
        ${strains.map(s => `<button class="btn-outline btn-sm" style="${chosenStrain===s?'background:#2c5f8a;color:#fff':''}" onclick="setStrain('${s}')">${strainDisplay(s)}</button>`).join('')}
      </div>`;

    if (chosenLevel && chosenStrain) {
      const sym = STRAIN_SYM[chosenStrain];
      const cls = STRAIN_CLS[chosenStrain];
      html += `<div style="font-size:1.2rem">Your bid: <strong class="${cls}">${chosenLevel}${sym}</strong></div>`;
      if (!submitted) {
        html += `<button class="btn-primary btn-sm" onclick="submitE()">Submit Bid</button>`;
      }
    }

    if (submitted) html += `<div id="te-feedback"></div>`;
    html += '</div>';
    container.innerHTML = html;

    if (submitted) {
      const correct = chosenLevel === puzzle.correctLevel && chosenStrain === puzzle.correctStrain;
      const fb = document.getElementById('te-feedback');
      fb.className = 'quiz-feedback ' + (correct ? 'correct' : 'wrong');
      fb.innerHTML = (correct ? '✓ Correct! ' : '✗ Not quite. ') + puzzle.explanation;
    }
  }

  window.setLevel  = function(l) { if (!submitted) { chosenLevel  = l; renderE(); } };
  window.setStrain = function(s) { if (!submitted) { chosenStrain = s; renderE(); } };
  window.submitE   = function() {
    if (!chosenLevel || !chosenStrain || submitted) return;
    submitted = true;
    renderE();
    const correct = chosenLevel === puzzle.correctLevel && chosenStrain === puzzle.correctStrain;
    onAnswered(correct, puzzle.explanation);
  };

  renderE();
}

// ── Type F: Sequential reveal ────────────────────────────────────
function renderTypeF(puzzle, container, onAnswered) {
  let step     = 0;
  let answered = false;

  function renderF() {
    let stepsHtml = '<div class="step-log">';
    for (let i = 0; i <= step && i < puzzle.steps.length; i++) {
      const s   = puzzle.steps[i];
      const cls = i === step ? 'step-item highlight' : 'step-item';
      stepsHtml += `<div class="${cls}">${s.text}${s.note ? `<div style="font-size:.9rem;color:#666;margin-top:2px">${s.note}</div>` : ''}</div>`;
    }
    stepsHtml += '</div>';

    let html = stepsHtml;
    if (step < puzzle.steps.length - 1) {
      html += `<button class="btn-primary btn-sm" onclick="stepF()">Next Step →</button>`;
    } else if (!answered) {
      // Show question
      html += `<div style="margin-top:1rem;font-weight:bold;font-size:1.05rem">${puzzle.question}</div>`;
      html += `<div class="quiz-options" style="margin-top:.6rem">`;
      puzzle.options.forEach((opt, i) => {
        html += `<button class="quiz-option" id="tf-opt-${i}" onclick="selectF(${i})">${opt}</button>`;
      });
      html += '</div><div id="tf-feedback"></div>';
    } else {
      html += `<div id="tf-feedback"></div>`;
    }
    container.innerHTML = html;
    if (answered) {
      // Re-render feedback
      renderFeedback();
    }
  }

  function renderFeedback() {
    const fb = document.getElementById('tf-feedback');
    if (fb) {
      fb.className = 'quiz-feedback correct';
      fb.innerHTML = '✓ ' + puzzle.explanation;
    }
  }

  window.stepF   = function() { if (step < puzzle.steps.length - 1) { step++; renderF(); } };
  window.selectF = function(i) {
    if (answered) return;
    answered = true;
    const correct = i === puzzle.correct;
    puzzle.options.forEach((_, j) => {
      const btn = document.getElementById('tf-opt-' + j);
      if (!btn) return;
      btn.disabled = true;
      if (j === puzzle.correct) btn.classList.add('correct-answer');
      if (j === i && !correct)  btn.classList.add('wrong-answer');
    });
    setTimeout(() => {
      const fb = document.getElementById('tf-feedback');
      if (fb) {
        fb.className = 'quiz-feedback ' + (correct ? 'correct' : 'wrong');
        fb.innerHTML = (correct ? '✓ Correct! ' : '✗ Not quite. ') + puzzle.explanation;
      }
    }, 50);
    onAnswered(correct, puzzle.explanation);
  };

  renderF();
}
